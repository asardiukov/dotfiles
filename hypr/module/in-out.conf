
#ВВОД И ЖЕСТЫ ----------------------------------------------------------------------------------------------------------------------------------------------------
input {
    kb_layout = us,ru
    kb_options = grp:caps_toggle
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = false
        tap-to-click = true
        clickfinger_behavior = true
    }
}

#МОНИТОР----------------------------------------------------------------------------------------------------------------------------------------------------
monitor=eDP-1,preferens, auto, 2
misc {
    force_default_wallpaper = 0    # Выключает стандартные обои Hyprland
    disable_hyprland_logo = true   # Убирает логотип при загрузке
}

