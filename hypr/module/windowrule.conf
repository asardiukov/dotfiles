#---ПЛАВАЮЩИЕ ОКНА (FLOAT RULES) 
#Плавающий режим
windowrule = float 1, match:class ^(calendar-float)$
windowrule = float 1,match:class ^(Bitwarden)$
windowrule = float 1,match:class ^(org\.qbittorrent\.qBittorrent)$
windowrule = float 1,match:class ^(localsend)$
windowrule = float 1,match:class ^(xdg-desktop-portal-gtk)$
windowrule = float 1,match:title ^(Open File)$
windowrule = float 1,match:title ^(Save File)$
windowrule = float 1,match:title ^(Печать)
windowrule = float 1,match:title ^(Print)$
windowrule = float 1,match:title ^(A001)$
windowrule = float 1,match:class ^(float_calcure)
windowrule = float 1,match:class ^(sys-manager)$
windowrule = float 1,match:class ^(.blueman-manager-wrapped)$
#Анимация
windowrule = animation slide right,match:class ^(sys-manager)$
windowrule = animation slide right,match:class ^(.blueman-manager-wrapped)$
#Центрируем
windowrule = center 1,match:class ^(org\.qbittorrent\.qBittorrent)$
windowrule = center 1,match:class ^(Bitwarden)$
windowrule = move 12 47,match:class ^(.scrcpy-wrapped)$
windowrule = move 515 47,match:class ^(float_calcure)$
windowrule = move 1300 60,match:class ^(sys-manager)$
windowrule = move 1110 60,match:class ^(sys-manager)$
windowrule = move 1110 60,match:class ^(.blueman-manager-wrapped)$
#Задаем размер
windowrule = size 1100 700,match:class ^(org\.qbittorrent\.qBittorrent)$ match:title ^(qBittorrent)(.*)$
windowrule = size 450 250,match:class ^(calendar-float)$
windowrule = size 483 1058,match:class ^(.scrcpy-wrapped)$ 
windowrule = size 1200 600,match:class ^(float_calcure)$
windowrule = size 600 1000,match:class ^(sys-manager)$
windowrule = size 600 1000,match:class ^(.blueman-manager-wrapped)$
