windowrule = workspace 1,match:class ^(kitty)$
windowrule = workspace 1,match:class ^(code)$
windowrule = workspace 1,match:class ^(geany)$
windowrule = workspace 1,match:class ^(chrome-mjoklplbddabcmpepnokjaffbmgbkkgg-Default)$
