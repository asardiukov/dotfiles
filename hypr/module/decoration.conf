#ПЕРЕМЕННЫЕ ОКРУЖЕНИЯ ----------------------------------------------------------------------------------------------------------------------------------------------------
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = GDK_BACKEND,wayland,x11
env = QT_QPA_PLATFORM,wayland;xcb

#ВНЕШНИЙ ВИД ----------------------------------------------------------------------------------------------------------------------------------------------------
general {
    gaps_in = 6
    gaps_out = 12
    border_size = 3
    col.active_border = rgba(89b4faff) rgba(cba6f7ff) 45deg
    col.inactive_border = rgba(1e1e2eaa)
    layout = dwindle
    # Включает возможность тянуть за края окон мышкой
    resize_on_border = true
    
    # Определяет "чувствительность" края (насколько близко надо поднести курсор)
    extend_border_grab_area = 20
    
    # Позволяет кликать по границе, даже если она перекрыта другим окном
    hover_icon_on_border = true
}
decoration {
    rounding = 14
    active_opacity = 0.95
    inactive_opacity = 0.85
    shadow {
        enabled = true
        range = 25
        render_power = 4
        color = rgba(00000077)
    }
    blur {
        enabled = true
        size = 8
        passes = 3
    }
}

#АНИМАЦИИ ---------------------------------------------------------------------
animation = specialWorkspace, 1, 5, default, slidevert
animations {
    enabled = true
    bezier = overshot,0.05,0.9,0.1,1.05
    bezier = smoothIn,0.25,1,0.5,1
    animation = windows,1,5,overshot,popin 80%
    animation = windowsMove,1,4,smoothIn,slide
    animation = workspaces,1,6,smoothIn,slidefade 20%
}
xwayland {
  force_zero_scaling = true
}

