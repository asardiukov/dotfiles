# =========================================================================
# HYPRLAND CONFIG - MacBook Pro ARM (NixOS Asahi)
# Стандарт синтаксиса: v0.53+ (Legacy windowrulev2 removed)
# =========================================================================

#ПЕРЕМЕННЫЕ И ПРОГРАММЫ ----------------------------------------------------------------------------------------------------------------------------------------------------
$mainMod = SUPER
$terminal = kitty
$menu = wofi --show drun
$fileManager = nautilus

#module
source = $HOME/.config/hypr/module/in-out.conf
source = $HOME/.config/hypr/module/exec-once.conf
source = $HOME/.config/hypr/module/decoration.conf
source = $HOME/.config/hypr/module/bind.conf
source = $HOME/.config/hypr/module/windowrule.conf

source = $HOME/.config/hypr/noctalia/noctalia-colors.conf
